<!DOCTYPE html><html lang="id"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>Tetris Ultimate SPA</title>    <style>        :root {            --bg-color: #0f172a;            --panel-color: #1e293b;            --accent-color: #38bdf8;            --text-color: #f8fafc;            --danger-color: #ef4444;        }        * {            box-sizing: border-box;            touch-action: none; /* Mencegah scroll dan zoom otomatis */            -webkit-tap-highlight-color: transparent;            user-select: none; /* Mencegah teks terpilih saat klik cepat */        }        body {            background-color: var(--bg-color);            color: var(--text-color);            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;            display: flex;            flex-direction: column;            align-items: center;            justify-content: center;            height: 100vh;            margin: 0;            overflow: hidden;        }        /* Header Skor & Level */        .header {            display: flex;            gap: 15px;            margin-bottom: 10px;            width: 100%;            max-width: 300px;            justify-content: center;        }        .stat {            background: var(--panel-color);            padding: 10px;            border-radius: 12px;            text-align: center;            flex: 1;            border: 1px solid #334155;            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);        }        .stat-label { font-size: 10px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }        .stat-value { font-size: 20px; font-weight: 800; color: var(--accent-color); }        /* Area Permainan */        #game-container {            position: relative;            background: #000;            border: 4px solid #334155;            border-radius: 12px;            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);        }        canvas {            display: block;            max-width: 85vw;            max-height: 55vh;            image-rendering: pixelated; /* Membuat kotak terlihat tajam */        }        /* Overlay Pesan */        #overlay {            position: absolute;            top: 0; left: 0; width: 100%; height: 100%;            background: rgba(15, 23, 42, 0.85);            display: flex;            flex-direction: column;            align-items: center;            justify-content: center;            border-radius: 8px;            z-index: 10;            backdrop-filter: blur(4px);        }        .msg-title { font-size: 28px; font-weight: 900; margin-bottom: 20px; color: var(--danger-color); }        /* Kontroler (Bekerja di Mobile & PC) */        #controls {            margin-top: 20px;            display: grid;            grid-template-columns: repeat(3, 75px);            grid-template-rows: repeat(2, 75px);            gap: 10px;            padding-bottom: 20px;        }        .btn {            background: var(--panel-color);            border: 2px solid #334155;            border-radius: 18px;            color: white;            font-size: 28px;            display: flex;            align-items: center;            justify-content: center;            cursor: pointer;            transition: all 0.1s;            box-shadow: 0 4px 0 #0f172a;        }        .btn:active {            transform: translateY(4px);            box-shadow: 0 0 0 #0f172a;            background: var(--accent-color);        }        .btn-main {            grid-column: 2;            background: #0ea5e9;            border: none;            font-size: 14px;            font-weight: bold;            text-transform: uppercase;        }        #rotate { color: #fbbf24; }        @media (min-width: 600px) {            #controls { transform: scale(0.9); }        }    </style></head><body>    <div class="header">        <div class="stat">            <div class="stat-label">Skor</div>            <div id="score" class="stat-value">0</div>        </div>        <div class="stat">            <div class="stat-label">Level</div>            <div id="level" class="stat-value">1</div>        </div>    </div>    <div id="game-container">        <canvas id="tetris" width="240" height="480"></canvas>        <div id="overlay">            <div id="msg" class="msg-title">TETRIS</div>            <button id="start-btn-overlay" style="padding: 12px 24px; border-radius: 30px; border: none; background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer;">MULAI GAME</button>        </div>    </div>    <div id="controls">        <div class="btn" id="left">←</div>        <div class="btn" id="rotate">↻</div>        <div class="btn" id="right">→</div>        <div></div>        <div class="btn" id="down">↓</div>        <div class="btn btn-main" id="play-pause">PAUSE</div>    </div>    <script>        const canvas = document.getElementById('tetris');        const context = canvas.getContext('2d');        const scoreEl = document.getElementById('score');        const levelEl = document.getElementById('level');        const overlay = document.getElementById('overlay');        const msgEl = document.getElementById('msg');        const startBtnOverlay = document.getElementById('start-btn-overlay');        const playPauseBtn = document.getElementById('play-pause');        context.scale(24, 24);        // Warna modern neon        const colors = [            null,            '#00f3ff', // I - Cyan            '#0055ff', // J - Blue            '#ff8800', // L - Orange            '#ffee00', // O - Yellow            '#00ff44', // S - Green            '#aa00ff', // T - Purple            '#ff0044'  // Z - Red        ];        const pieces = 'ILJOTSZ';        function createPiece(type) {            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];            if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];            if (type === 'J') return [[0,2,0],[0,2,0],[2,2,0]];            if (type === 'O') return [[4,4],[4,4]];            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];            if (type === 'S') return [[0,5,5],[5,5,0],[0,0,0]];            if (type === 'T') return [[0,6,0],[6,6,6],[0,0,0]];        }        function createMatrix(w, h) {            const matrix = [];            while (h--) matrix.push(new Array(w).fill(0));            return matrix;        }        function drawMatrix(matrix, offset, isGhost = false) {            matrix.forEach((row, y) => {                row.forEach((value, x) => {                    if (value !== 0) {                        context.fillStyle = isGhost ? 'rgba(255, 255, 255, 0.15)' : colors[value];                        context.fillRect(x + offset.x, y + offset.y, 1, 1);                                                if (!isGhost) {                            // Border balok tipis                            context.strokeStyle = 'rgba(0,0,0,0.3)';                            context.lineWidth = 0.05;                            context.strokeRect(x + offset.x, y + offset.y, 1, 1);                        }                    }                });            });        }        function draw() {            // Background grid gelap            context.fillStyle = '#000';            context.fillRect(0, 0, canvas.width, canvas.height);                        drawMatrix(arena, {x: 0, y: 0});                        if (player.matrix) {                // Gambar Ghost Piece                const ghostPos = getGhostPosition();                drawMatrix(player.matrix, ghostPos, true);                // Gambar Player Piece                drawMatrix(player.matrix, player.pos);            }        }        function getGhostPosition() {            const ghost = { pos: { x: player.pos.x, y: player.pos.y }, matrix: player.matrix };            while (!collide(arena, ghost)) {                ghost.pos.y++;            }            ghost.pos.y--;            return ghost.pos;        }        function collide(arena, player) {            const [m, o] = [player.matrix, player.pos];            for (let y = 0; y < m.length; ++y) {                for (let x = 0; x < m[y].length; ++x) {                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;                }            }            return false;        }        function merge(arena, player) {            player.matrix.forEach((row, y) => {                row.forEach((value, x) => {                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;                });            });        }        function rotate(matrix, dir) {            for (let y = 0; y < matrix.length; ++y) {                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];            }            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();        }        function playerDrop() {            player.pos.y++;            if (collide(arena, player)) {                player.pos.y--;                merge(arena, player);                playerReset();                arenaSweep();                updateScore();            }            dropCounter = 0;        }        function playerMove(dir) {            player.pos.x += dir;            if (collide(arena, player)) player.pos.x -= dir;        }        function playerRotate(dir) {            const pos = player.pos.x;            let offset = 1;            rotate(player.matrix, dir);            while (collide(arena, player)) {                player.pos.x += offset;                offset = -(offset + (offset > 0 ? 1 : -1));                if (offset > player.matrix[0].length) {                    rotate(player.matrix, -dir);                    player.pos.x = pos;                    return;                }            }        }        function playerReset() {            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);            player.pos.y = 0;            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);                        if (collide(arena, player)) {                // GAME OVER                isPaused = true;                msgEl.innerText = "GAME OVER";                overlay.style.display = 'flex';                playPauseBtn.innerText = "PLAY";            }        }        function arenaSweep() {            let rowCount = 1;            outer: for (let y = arena.length - 1; y > 0; --y) {                for (let x = 0; x < arena[y].length; ++x) {                    if (arena[y][x] === 0) continue outer;                }                const row = arena.splice(y, 1)[0].fill(0);                arena.unshift(row);                ++y;                player.score += rowCount * 10;                rowCount *= 2;            }        }        function updateScore() {            scoreEl.innerText = player.score;            const currentLevel = Math.floor(player.score / 100) + 1;            levelEl.innerText = currentLevel;            dropInterval = Math.max(100, 1000 - (currentLevel - 1) * 100);        }        let dropCounter = 0;        let dropInterval = 1000;        let lastTime = 0;        let isPaused = true;        const arena = createMatrix(10, 20);        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };        function update(time = 0) {            if (!isPaused) {                const deltaTime = time - lastTime;                lastTime = time;                dropCounter += deltaTime;                if (dropCounter > dropInterval) playerDrop();                draw();                requestAnimationFrame(update);            }        }        function toggleGame() {            if (msgEl.innerText === "GAME OVER") {                // Reset Total                arena.forEach(row => row.fill(0));                player.score = 0;                updateScore();                playerReset();                msgEl.innerText = "TETRIS";            }            isPaused = !isPaused;            overlay.style.display = isPaused ? 'flex' : 'none';            playPauseBtn.innerText = isPaused ? "RESUME" : "PAUSE";                        if (!isPaused) {                if (!player.matrix) playerReset();                lastTime = performance.now();                update();            }        }        // BINDING KONTROL (Mendukung Mouse PC & Touch HP)        const bindControl = (id, action) => {            const el = document.getElementById(id);            // pointerdown menangani klik mouse & sentuhan jari sekaligus            el.addEventListener('pointerdown', (e) => {                e.preventDefault();                if (!isPaused) {                    action();                    draw();                }            });        };        bindControl('left', () => playerMove(-1));        bindControl('right', () => playerMove(1));        bindControl('rotate', () => playerRotate(1));        bindControl('down', () => playerDrop());        // Button Start/Pause        document.getElementById('play-pause').addEventListener('click', toggleGame);        startBtnOverlay.addEventListener('click', toggleGame);        // KEYBOARD PC        document.addEventListener('keydown', e => {            if (isPaused) {                if (e.keyCode === 32 || e.keyCode === 13) toggleGame(); // Space/Enter to Start                return;            }            if (e.keyCode === 37) playerMove(-1);      // Panah Kiri            else if (e.keyCode === 39) playerMove(1);  // Panah Kanan            else if (e.keyCode === 40) playerDrop();   // Panah Bawah            else if (e.keyCode === 38) playerRotate(1);// Panah Atas            else if (e.keyCode === 80) toggleGame();   // 'P' for Pause            draw();        });        // Inisialisasi awal        draw();    </script></body></html>
