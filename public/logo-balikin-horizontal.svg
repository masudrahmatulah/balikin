    <rect x="5" y="8" width="18" height="18" rx="4" fill="url(#balikinGradientH)" opacity="0.3"/>
    <rect x="48" y="8" width="18" height="18" rx="4" fill="url(#balikinGradientH)" opacity="0.3"/>
    <rect x="5" y="51" width="18" height="18" rx="4" fill="url(#balikinGradientH)" opacity="0.3"/>

    <circle cx="14" cy="17" r="3" fill="url(#balikinGradientH)"/>
    <circle cx="57" cy="17" r="3" fill="url(#balikinGradientH)"/>
    <circle cx="14" cy="60" r="3" fill="url(#balikinGradientH)"/>

