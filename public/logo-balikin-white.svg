<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- White version for dark backgrounds -->

  <!-- QR Corner Elements -->
  <rect x="25" y="25" width="35" height="35" rx="8" fill="white" opacity="0.25"/>
  <circle cx="42.5" cy="42.5" r="6" fill="white"/>

  <rect x="140" y="25" width="35" height="35" rx="8" fill="white" opacity="0.25"/>
  <circle cx="157.5" cy="42.5" r="6" fill="white"/>

  <rect x="25" y="140" width="35" height="35" rx="8" fill="white" opacity="0.25"/>
