  <!-- Center QR Dots -->
  <circle cx="100" cy="100" r="12" fill="white" opacity="0.6"/>
  <circle cx="75" cy="75" r="5" fill="white" opacity="0.8"/>
  <circle cx="125" cy="75" r="5" fill="white" opacity="0.8"/>
